<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>EcoCalc | ITB Leaks Edition</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">ITB<span>LEAKS</span></div>
            <ul class="nav-links">
                <li><a href="#data">Data Cleaning</a></li>
                <li><a href="#calc">Calculadora F3</a></li>
                <li><a href="#estrategia">Pla 30%</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>Anàlisi de Sostenibilitat <span class="gradient-text">ITB Leaks</span></h1>
            <p>Basat en l'auditoria de factures i consums d'aigua reals.</p>
        </section>
        <section id="data-cleaning" class="container">
            <h2>Indicadors Clau (Fase 1.2: Data Cleaning)</h2>
            <div id="grid-asg" class="results-grid">
                <p>Carregant dades de l'auditoria...</p>
            </div>
        </section>

        <section id="calc" class="container">
            <div class="card-input">
                <h3>Calculadora d'Impacte (Fase 3)</h3>
                <div class="input-grid">
                    <div class="group">
                        <label>Consum Aigua Basal (L/h)</label>
                        <input type="number" id="input-aigua" value="193">
                    </div>
                    <div class="group">
                        <label>Recanvis de Material</label>
                        <input type="number" id="input-recanvis" value="170">
                    </div>
                    <div class="group">
                        <label>Hores activitat curs</label>
                        <input type="number" id="input-hores" value="1800">
                    </div>
                </div>
                <button onclick="calcularF3()" class="btn-calc">Calcular Previsions i Reducció</button>
            </div>

            <div id="results-f3" class="results-grid">
                </div>
        </section>
    </main>
    <script src="js/calculator.js"></script>
</body>
</html>
